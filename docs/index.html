<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<title>Cricket Rules Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat">
    <header class="bar">
      <div class="title">
        <span class="logo">🏏</span>
        <div>
          <h1>Cricket Rules Chat</h1>
          <span id="health" class="health"><span class="dot"></span>connecting…</span>
        </div>
      </div>
    </header>

    <main id="thread" class="thread" aria-live="polite"></main>

    <form id="composer" class="composer" autocomplete="off">
      <input id="question" type="text" inputmode="text"
             placeholder="Ask a cricket rules question…" maxlength="500" />
      <button id="send" type="submit" aria-label="Send">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M3 20.5v-6l8-2.5-8-2.5v-6l19 8.5z"/></svg>
      </button>
    </form>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
